<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard ค่าขนส่งตามจังหวัด</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', Tahoma, sans-serif;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    min-height: 100vh;
    color: #e0e0e0;
  }
  .header {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(255,255,255,0.1);
    padding: 20px 30px;
    text-align: center;
  }
  .header h1 { font-size: 1.8rem; color: #fff; font-weight: 700; letter-spacing: 1px; }
  .header .subtitle { color: #a0c4ff; font-size: 0.9rem; margin-top: 5px; }
  .container { max-width: 1200px; margin: 0 auto; padding: 24px; }

  .stats-bar { display: flex; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; }
  .stat-card {
    flex: 1; min-width: 130px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 12px; padding: 16px; text-align: center;
  }
  .stat-card .value { font-size: 1.8rem; font-weight: 700; color: #60a5fa; }
  .stat-card .label { font-size: 0.8rem; color: #9ca3af; margin-top: 4px; }

  .search-box {
    background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
    border-radius: 12px; padding: 16px 20px; margin-bottom: 20px;
    display: flex; gap: 12px; align-items: center;
  }
  .search-box input {
    flex: 1; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.2);
    border-radius: 8px; padding: 10px 14px; color: #fff; font-size: 0.95rem;
  }
  .search-box input::placeholder { color: #9ca3af; }
  .search-box input:focus { outline: none; border-color: #60a5fa; }
  .clear-btn {
    background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
    border-radius: 6px; padding: 8px 14px; color: #e0e0e0; cursor: pointer; font-size: 0.85rem;
  }

  .section {
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.12);
    border-radius: 16px; padding: 20px; margin-bottom: 20px;
  }
  .section-title {
    font-size: 1rem; font-weight: 600; color: #a0c4ff; margin-bottom: 14px;
    display: flex; align-items: center; gap: 8px;
  }
  .section-title::before {
    content: ''; display: inline-block; width: 4px; height: 18px;
    background: #60a5fa; border-radius: 2px;
  }

  .province-grid { display: flex; flex-wrap: wrap; gap: 8px; }
  .province-btn {
    background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.2);
    border-radius: 8px; padding: 8px 16px; color: #e0e0e0; cursor: pointer;
    font-size: 0.88rem; transition: all 0.2s; white-space: nowrap;
  }
  .province-btn:hover { background: rgba(96,165,250,0.25); border-color: #60a5fa; color: #fff; }
  .province-btn.active {
    background: #2563eb; border-color: #3b82f6; color: #fff; font-weight: 600;
    box-shadow: 0 0 16px rgba(59,130,246,0.4);
  }

  .district-grid { display: flex; flex-wrap: wrap; gap: 8px; }
  .district-btn {
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.15);
    border-radius: 8px; padding: 7px 14px; color: #d1d5db; cursor: pointer;
    font-size: 0.85rem; transition: all 0.2s;
  }
  .district-btn:hover { background: rgba(52,211,153,0.2); border-color: #34d399; color: #fff; }
  .district-btn.active {
    background: #059669; border-color: #10b981; color: #fff; font-weight: 600;
    box-shadow: 0 0 12px rgba(16,185,129,0.4);
  }
  .has-cust { display: inline-block; width: 6px; height: 6px; background: #fbbf24; border-radius: 50%; margin-left: 5px; vertical-align: middle; }

  .result-panel { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.12); border-radius: 16px; padding: 24px; }
  .result-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
  .result-title { font-size: 1.2rem; font-weight: 700; color: #fff; }
  .result-subtitle { color: #9ca3af; font-size: 0.85rem; }

  .price-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
  .price-card { border-radius: 12px; padding: 20px; text-align: center; border: 1px solid rgba(255,255,255,0.15); }
  .price-card.blue { background: linear-gradient(135deg, rgba(37,99,235,0.3), rgba(59,130,246,0.15)); border-color: rgba(96,165,250,0.4); }
  .price-card.blue2 { background: linear-gradient(135deg, rgba(37,99,235,0.15), rgba(59,130,246,0.08)); border-color: rgba(96,165,250,0.3); }
  .price-card.green { background: linear-gradient(135deg, rgba(5,150,105,0.3), rgba(16,185,129,0.15)); border-color: rgba(52,211,153,0.4); }
  .price-card.green2 { background: linear-gradient(135deg, rgba(5,150,105,0.15), rgba(16,185,129,0.08)); border-color: rgba(52,211,153,0.3); }
  .price-card.orange { background: linear-gradient(135deg, rgba(217,119,6,0.3), rgba(245,158,11,0.15)); border-color: rgba(251,191,36,0.4); }
  .pc-label { font-size: 0.78rem; color: #9ca3af; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
  .pc-value { font-size: 2rem; font-weight: 800; margin-bottom: 4px; }
  .price-card.blue .pc-value, .price-card.blue2 .pc-value { color: #93c5fd; }
  .price-card.green .pc-value, .price-card.green2 .pc-value { color: #6ee7b7; }
  .price-card.orange .pc-value { color: #fcd34d; }
  .pc-unit { font-size: 0.8rem; color: #9ca3af; }

  .customer-title { font-size: 0.9rem; font-weight: 600; color: #fbbf24; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
  .customer-title::before { content: '★'; font-size: 1rem; }
  .table-container { overflow-x: auto; border-radius: 8px; max-height: 450px; overflow-y: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
  th { background: rgba(255,255,255,0.1); padding: 10px 14px; text-align: left; color: #a0c4ff; font-weight: 600; border-bottom: 1px solid rgba(255,255,255,0.1); position: sticky; top: 0; z-index: 1; }
  td { padding: 10px 14px; border-bottom: 1px solid rgba(255,255,255,0.06); color: #e0e0e0; }
  tr:hover td { background: rgba(255,255,255,0.04); }
  .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-weight: 700; font-size: 0.85rem; }
  .badge.b4 { background: rgba(37,99,235,0.25); color: #93c5fd; border: 1px solid rgba(96,165,250,0.3); }
  .badge.b6 { background: rgba(5,150,105,0.25); color: #6ee7b7; border: 1px solid rgba(52,211,153,0.3); }
  .badge.na { color: #6b7280; font-style: italic; }

  .legend { display: flex; gap: 16px; flex-wrap: wrap; font-size: 0.8rem; color: #9ca3af; align-items: center; margin-top: 10px; }
  .ldot { display: inline-block; width: 8px; height: 8px; background: #fbbf24; border-radius: 50%; margin-right: 4px; }
  .placeholder { text-align: center; padding: 60px 20px; color: #6b7280; }
  .placeholder .icon { font-size: 3rem; margin-bottom: 16px; }

  @media (max-width: 600px) {
    .container { padding: 12px; }
    .header h1 { font-size: 1.3rem; }
    .price-cards { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>

<div class="header">

  <div class="subtitle">อัตราค่าขนส่ง ดีเซล 38.94/ลิตร &nbsp;|&nbsp; อัปเดต 30/03/69</div>
</div>

<div class="container">

  <div class="section" id="ds" style="display:none;">

  <div class="result-panel" id="rp">

  </div>
</div>

const D=RAW.map(r=>({...r,province:r.province.trim(),district:r.district.trim(),customer:r.customer.trim()}));

const PM={};
D.forEach(r=>{if(!PM[r.province])PM[r.province]={};if(!PM[r.province][r.district])PM[r.province][r.district]=[];PM[r.province][r.district].push(r);});

const PL=Object.keys(PM).sort((a,b)=>a.localeCompare(b,'th'));

const allDist=new Set(D.map(r=>r.province+'|'+r.district));
document.getElementById('s1').textContent=PL.length;
document.getElementById('s2').textContent=allDist.size;
document.getElementById('s3').textContent=D.length;
document.getElementById('s4').textContent=D.filter(r=>r.customer).length;

let selP=null,selD=null;

const hasCust=(p,d)=>(PM[p]?.[d]||[]).some(r=>r.customer);
const provHasCust=p=>Object.keys(PM[p]||{}).some(d=>hasCust(p,d));

function renderP(list){
  document.getElementById('pg').innerHTML=list.map(p=>{
    const dot=provHasCust(p)?'<span class="ldot" style="margin-left:4px;"></span>':'';
    return `<button class="province-btn${p===selP?' active':''}" onclick="selProv('${p}')">${p}${dot}</button>`;
  }).join('');
}

function selProv(p){selP=p;selD=null;renderP(PL);renderD();showProvResult();}

function renderD(){
  const sec=document.getElementById('ds');
  if(!selP){sec.style.display='none';return;}
  sec.style.display='block';
  document.getElementById('dt').innerHTML=`เลือกอำเภอใน <span style="color:#fff">${selP}</span>`;
  const dists=Object.keys(PM[selP]||{}).sort((a,b)=>a.localeCompare(b,'th'));
  document.getElementById('dg').innerHTML=dists.map(d=>{
    const dot=hasCust(selP,d)?'<span class="has-cust"></span>':'';
    return `<button class="district-btn${d===selD?' active':''}" onclick="selDist('${d}')">${d}${dot}</button>`;
  }).join('');
}

function selDist(d){selD=d;renderD();showDistResult();}

function fmt(v,cls){return v?`<span class="badge ${cls}">${v}</span>`:'<span class="badge na">-</span>';}

  const dists=Object.keys(PM[selP]);

  <div class="table-container"><table>
    <thead><tr><th>#</th><th>ชื่อลูกค้า / สถานที่</th><th>ระยะทาง</th><th>4 ล้อ</th><th>6-10 ล้อ</th></tr></thead>
    <tbody>${custs.map((c,i)=>`<tr><td style="color:#6b7280">${i+1}</td><td style="color:#ffd700;font-weight:500">${c.customer}</td><td>${c.distance?c.distance+' กม.':'-'}</td><td>${fmt(c.price_4wheel,'b4')}</td><td>${fmt(c.price_610wheel,'b6')}</td></tr>`).join('')}</tbody>
  </table></div>`:''}
  ${gen.length?`<div style="margin-top:${custs.length?'20px':'0'}">
  ${custs.length?'<div style="color:#9ca3af;font-size:0.85rem;margin-bottom:10px;">ราคาทั่วไป (ไม่ระบุชื่อ)</div>':''}
  <div class="table-container"><table>
    <thead><tr><th>ระยะทาง (กม.)</th><th>4 ล้อ (บาท)</th><th>6-10 ล้อ (บาท)</th></tr></thead>
    <tbody>${gen.map(r=>`<tr><td>${r.distance||'-'}</td><td>${fmt(r.price_4wheel,'b4')}</td><td>${fmt(r.price_610wheel,'b6')}</td></tr>`).join('')}</tbody>
  </table></div></div>`:''}
  ${!custs.length&&!gen.length?'<div style="color:#6b7280;padding:20px 0;text-align:center;">ไม่พบข้อมูล</div>':''}`;
}

function doSearch(){
  const q=document.getElementById('q').value.trim();
  if(!q){renderP(PL);renderD();return;}
  const res=D.filter(r=>r.province.includes(q)||r.district.includes(q)||r.customer.includes(q));
  const mP=[...new Set(res.map(r=>r.province))].sort((a,b)=>a.localeCompare(b,'th'));
  renderP(mP);
  document.getElementById('ds').style.display='none';
  const rp=document.getElementById('rp');
  if(!res.length){rp.innerHTML='<div class="placeholder"><div class="icon">🔍</div><p>ไม่พบข้อมูลที่ค้นหา</p></div>';return;}
  rp.innerHTML=`
  <div class="result-header"><div>
    <div class="result-title">🔍 ผลการค้นหา: "${q}"</div>
    <div class="result-subtitle">พบ ${res.length} รายการ</div>
  </div></div>
  <div class="table-container"><table>
    <thead><tr><th>จังหวัด</th><th>อำเภอ</th><th>ชื่อลูกค้า / สถานที่</th><th>ระยะทาง</th><th>4 ล้อ</th><th>6-10 ล้อ</th></tr></thead>
    <tbody>${res.map(r=>`<tr><td>${r.province}</td><td>${r.district}</td><td style="color:${r.customer?'#ffd700':'#e0e0e0'}">${r.customer||'-'}</td><td>${r.distance?r.distance+' กม.':'-'}</td><td>${fmt(r.price_4wheel,'b4')}</td><td>${fmt(r.price_610wheel,'b6')}</td></tr>`).join('')}</tbody>
  </table></div>`;
}

function clearAll(){
  document.getElementById('q').value='';
  selP=null;selD=null;
  renderP(PL);
  document.getElementById('ds').style.display='none';
  document.getElementById('rp').innerHTML='<div class="placeholder"><div class="icon">🗺️</div><p>กรุณาเลือกจังหวัดและอำเภอเพื่อดูข้อมูลค่าขนส่ง</p></div>';
}

renderP(PL);
</script>
</body>
</html>
